name: WIZZY Multi-Platform Build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - name: Build Windows Exe
        run: flutter build windows --release # COMMANDE SIMPLE ✅
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: wizzy-windows-exe
          path: build/windows/x64/runner/Release/
