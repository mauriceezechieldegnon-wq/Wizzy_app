name: WIZZY Multi-Platform Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wizzy-android-apk
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Enable Windows
        run: flutter config --enable-windows-desktop
      
      # --- LA COMMANDE QUI VA TOUT DÉBLOQUER ---
      - name: Build Windows Exe
        shell: bash
        run: flutter build windows --release -t lib/main.dart -- -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: wizzy-windows-exe
          path: build/windows/x64/runner/Release/
