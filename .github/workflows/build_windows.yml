name: WIZZY Windows Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # ON DESACTIVE LE CACHE POUR CE COUP-CI POUR NETTOYER LE BUG
          cache: false 

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows
        run: flutter config --enable-windows-desktop

      - name: Build Windows Exe
        # On ajoute le flag pour ignorer les erreurs de version CMake de Firebase
        run: flutter build windows --release -- -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wizzy-windows-release
          path: build/windows/x64/runner/Release/
